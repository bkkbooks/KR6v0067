body:
  text: 大黑天神道場儀整理者侯沖題解大黑天神道場儀中國僧人所撰典籍著者不詳卷數不詳宋代大理國阿吒力僧用科儀本科儀無題名內容未見於歷代大藏經現標題為整理者擬名本科儀年月在雲南大理白族自治州鳳儀北湯天董氏宗祠發現現藏雲南省圖書館雲南師範大學圖書館依原卷制有縮微膠片但有錯簡本科儀與大理國寫本宗密撰大方廣圓覺修多羅了義經疏分抄於同一蝴蝶裝紙冊的兩面周泳先楊延福在五十年代整理時認為後者為大理國寫本而前者則是明人所抄事實上宗密撰圓覺疏是抄寫在兩個內容不相銜接的斷卷的背面因為兩個斷卷儘管字體同一風格但前一部分為大黑天神道場儀有硃筆批點後一部分為廣施無遮道場儀無批點宗密撰圓覺疏除現存寫本殘缺一頁而缺字外內容前後一貫故可以推斷本科儀與廣施無遮道場儀的抄寫年代比大理國寫本宗密撰圓覺疏要稍早本科儀對七種大黑天神和白姐聖妃的形貌有詳實的記述是研究中國佛教早期科儀和大黑天神的重要資料也是研究雲南大黑天神與白姐聖妃的第一手資料整理本先據雲南省圖書館藏縮微膠片抄録後用原本校正無校本録文前殘麟角唱如來會羊車演教果超諸漏識照皆空聞聲及第於鷲峰授記登科於鹿苑自他俱利吞日月之九轉丹誠威德有光吸煙霞之五明學論種善根於諸部之稱上首受佛囑於四衆之繞世尊面奉一毫光耳聆金口語獨覺辟支果地前頂中化火便身焚出無佛世緣生滅樂在山林不倚偏諸漏頓超羅漢位單修已悟聲聞天中小二乘同進趣觀花飛錫樂金田加持辟支羅漢真言讚揚大黑天神儀當演身實佛大黑於太虛以立名勇猛權神迦羅依真性而成像外現天神七變芥納須彌內實毗盧一真性含大地形容忿怒掃除外道天魔心地慈悲指示蓮境聖中最聖乃十方三世之至尊天上極天實生之正主一身七現七相一分虎目龍牙鍾眉德為威鋤邪神掃災塵勇氣見聞始登妙覺知會令契真如殊盛迦羅大黑天七形聖主最為先內融佛性仁慈智外現神威勇猛權身遍太虛何所際心包法界廣無邊利生除疫洪恩德赫赫毫光遍大千加持大黑主聖真言安樂迦羅周法界融一真權化安樂藥叉之相現金剛光大日發明虛靈覺知之心內含法性慈悲外現天神勇猛身垂臂六面示目三左上手持鉞斧而電光中戟叉之下慧劍右上手執持層鼓而雷響中絹索之下髏杯足踏七星裙皮一虎神威赫赫普照於三千大千堂堂聖相廣資於有色無色三眼觀三界之物四牙咬四生之根六臂果證六通二足因二氣掌人間之壽命添六籍之星官掃除外魔衛護中圍國家增長龜齡鶴算人人永無疆之福恩陸仁被幽冥同證無上菩提頓除有終煩惱二現安樂藥叉神蕩蕩雄容利物人尊像崢嶸魔膽碎靈威赫奕世風淳慈悲為念資幽顯方順隨機掃業塵主宰壽齡增祿位內融真智法王身加持日月迦羅真浩氣迥須彌日月光明之大聖妙法身遍大果花實秀之同時體周法界難窮毫光皎皎心廣太虛無際空寂優優面張二眸身垂四臂左上託日智下智骷髏之杯右上捧月輪下牽戟槍之杖四臂主四時之氣三目顯三才之流日烏足有三智天關月兔魄具五光地軸金剛現相權攝有形無形華藏光風實分等覺妙覺勇降賊寇心寒膽顫頓除強竊之徒仁被冤親根淨身清解釋我人之債太虛日月光明天三現迦羅佛性圓虛光周沙界昂昂浩氣護金田儔混五娟勇猛風威降賊寇流源華藏一乘園加持日月天神真言金鉢迦羅大黑池雄威現化形金鉢之迦羅十華藏法性融自實毗盧之清淨灌九龍於香水海浩浩朝宗護三寶於紫金田恢恢衛法首分三面體具一身面各三眸身同六臂左上手持鈴而傳三界中螺杯而下弓右上手持杵智而動十方中螺杯而下箭一龍捧座二足攝蓮玉色輝皎皎心中之月金容晃曜巍巍海上之峰六臂掃於六塵三面消於三毒九目觀九有一身淨一心官非免獄刑災害蠲苦惱黑池金鉢大黑天四現天神猛烈多慧眼遙觀塵界外他心自攝寸方過金鉢繞座投香水寶杵騰拳息戟戈自此皆災危蕩盡靈光晃曜遍娑婆加持金鉢天神真言陰府判生死權大黑仿間之聖覺場圓事理示普光明殿之天靈威勇烈宰冥陽準繩善惡浩氣騰輝沖宇宙刻紏戚休面示三眸身垂八臂左上手持尺而中印次索下柳枝右上手持鐸而中印次鈴下盂鉢體釧蛇蝮足踏象豬八臂頓除於八邪三眼常觀於三密豬乃五智文殊空寂無生之現象則萬行薩埵真照不滅之源主伴重重佛身剎剎從寂起照而春生萬戶自實分權而月映千江超升亡者魂靈明心見性覆祐存眷壽命脫死回生統御冥司登十地之階衡興人世沐九天之福仿間大聖迦羅天五現神威顯赫然猛相輝輝衝宇宙恩光浩浩育山川冥陽善惡丹書判凡聖果因玉簡遍蠢動含靈資性命虛靈知覺妙金仙加持冢間天神真言帝釋迦羅儀當演無上天權帝釋桓因之瑞相旃檀林一真性實毗盧遮那之法王猛雄位列七神中武威赫赫善法堂尊之上帝文相彬彬金闕一身玉軀二臂右手執吉祥之寶印左手伸童子之聖人印掌泗洲率土之濱人證三會龍華之果武勇起忿怒而敵修羅之戰文仁示紅塵而保赤子之心光教法於上乘大乘該森羅於太極無極拔度生死運化古今恩霑三教九流德被四生六道俱沐太平之域咸歌極樂之天蒼穹帝釋提桓因六趣迦羅上聖神妙相巍巍登紫闕仁心蕩蕩擴紅塵寶冠瓔珞光三界繡扆釘鐺導萬民降伏邪魔歸正覺玉清玄境樂天真加持帝釋天神真言寶藏迦羅儀當演勇金剛氣清鋭乃護城寶藏之天神真佛性心圓融即法界玄門之地位奮勇風雷掃千障護國護民大獅豸除萬魔作威作福身垂八臂面現三眸左上手持杵而中輪次弓並下索右上手執劍而中輪次箭及下叉捧金輪座乘獅子三目觀三界八臂安八方輪蓮日月光輝獅禽獸烈果因證五位六位冥陽拔有情無情足食足兵息天下之干戈除瘟除癘絶人間之塗炭睹摩訶迦羅七現證毗盧海印三摩摩訶寶藏護城堅七現迦羅像已圓佛體化身真最上神心融佛本無遍法門八萬餘千教大密一多不二傳忿怒威光兵疫掃金剛蓮月自玄玄加持寶藏天神真言贊揚白姐聖妃獻明珠感佛果乃娑伽海女之真仙助猛聖正龍華實彌勒化后妃之神母華嚴大吉祥白姐鳳凰威儀梵語冰霜貞潔陰陽二氣天地一如頭戴三龍身垂二臂龍分中輔弼界統欲色無左手安自心指迷心覺心之理右手摩童頂開肉光空頂之門時登雲闕蟾宮統嫦姮證五通之果際會鰲海華藏騰濤浪作三會之尊微德昭昭毫光遍天上天下威儀齊齊寶蓋罩龍髻龍冠侍從神童參隨綵女資類咸生內院了色空悉會中圍赫赫迦羅大聖妃懿名白姐吉祥微龍華會上無為位祕密壇中有色威曾獻明珠銘佛念已登道果助神機參隨窈窕諸天女雲集光臨繞聖圍加持白姐聖妃真言中圍伴繞陰為鬼陽為神二氣乃天地間之造化聽弗聞視弗見一無終始際之體遺發現乎四時氣候之端化生乎萬物性情之理神鬼交參大密會陰陽融混上乘圍主尊三四化之聖威伴繞二十八之侍從夫五眼長子者頂戴骷髏左手叉戟截人頭右手乾陀翻鈴口七眼長子者手執金剛鉤器足頭踏東方大將者牙齒口唇三齒印手持腰鼓白螺杯南方大將者身珞人手貫七頭手持毒蛇一劍西方大將者左手作三齒金剛右手持斡叉戟北方大將者戴五人頭烏嘴尖持一螺杯三齒印迅疾風王者持三頭毒蛇根收邪魂魄歸正道大使火王者頂現馬頭立火輪手金剛真寶劍福德龍女者垂黃白色現菩薩持摩大雄猛王者身垂黑池開口牙手杯髑髏牽叉戟東方天女者一身貞潔貌芙蓉登白雲座四臂呈盤光日月現寶劍鋒南方天女者一身具菩薩妙相座擁蓮花六臂現香果花鬘鉢浮寶杵西方天女者身窈窕美姿容立寶石座四臂執燈帆東方楊柳託鼎香爐北方天女者一身歡喜乘馬座捧北斗七星六臂崢嶸獻虎頭振金剛鈴杵東方牛頭鬼王者身現青色履毒蛇手執金剛堅利劍南方鳥頭鬼王者身垂黑色立寶石手持鋭斧斬邪魔西方兔頭鬼王者身現青色立白鵝手執五綵揚旗仗北方虎頭鬼王者身垂黃色立死尸東方獅頭力士者身現青色天磚衣手持風袋露青杵南方狗頭力士者垂黃形身持弓箭射勢西方鳳頭力士者身垂赤色形背安鉞斧器北方豬頭力士者身緑口牙作咬勢手執三頭青毒蛇三子遣一子者現八目助法持寶現法王花蝦蟆頭力士者繫怪主餓鬼袋現三蝦蟆牛頭大士者身色作怪又佉妖手持怪袋豎青杵馬頭大力士者身垂二相盤捧十類頭大力士者一身面目露口右持叉戟左腰鼓天鬼神威德讚之難窮祕密宗風類之無盡權化忿怒為主伴實際慈悲證果因有神形鬼形人形驅邪扶正依佛寶法寶僧寶濟物利生咸遊最上無上之門總悟厥中執中之理大黑中圍教外傳陰陽會合自玄玄四三主聖迦羅化草八伴徙神鬼旋法器恢恢光日月威儀齊齊布雲霞何妨世俗塵勞染到此最乘別有天加持中圍伴繞真言十方善神儀當演夫十方者扶正之理守護之功域民不以封疆為界有德則來海衆盡列華藏之都無察則往東方憍尸迦天東南方火天仙神南方閻魔羅法王西南方羅剎女西方縛魯那龍王西北方風神王北方寶藏大神衆東北方大自在天王上方大梵天王下方堅牢地神衆各鎮八方居尊十地咸垂衛祐之恩廣布慈仁之德消除於不惻障本增長於無限福源夫婦和偕子孫吉慶六畜繁衍五穀豐登水火盜賊而弭消病怪妖魔而蕩散求遂意凡望隨心十方世界總包羅分守封疆自不過上下四隅皆有主物人萬像是誰何權輿天地資國界衡鑒密圍宰敵魔甚幸真容雲雨格維持救法樂單多加持十方善神真言上來讚揚法會上大黑中圍八位聖賢七形神衆降臨壇𡒌允應凡忱布法延齡利益了悟甚深奧旨趨竟法門拯拔幽陽增修福智二時終下殘録文完
